<template>
    <div class="builder-shell">
        <!-- Dark Header Bar -->
        <div class="builder-header-nav">
            <div class="nav-item nav-item_back">
                <lightning-button-icon icon-name="utility:back" variant="bare-inverse" size="medium" alternative-text="Back" onclick={handleBack}></lightning-button-icon>
            </div>
            <div class="nav-item nav-item_type">
                <lightning-icon icon-name="standard:work_type_group" size="x-small"></lightning-icon>
                <span class="nav-label">{labels.BuilderType}</span>
            </div>
            <div class="nav-item nav-item_name">
                <span class="nav-label">{labels.ModelName}</span>
                <lightning-button-icon icon-name="utility:edit" variant="bare-inverse" size="x-small" alternative-text="Edit name"></lightning-button-icon>
            </div>
            <template lwc:if={showAgentforceToggle}>
                <button type="button" class="nav-item nav-item_help" onclick={handleToggleAgentforce} aria-label={labels.AgentforceTitle}>
                    <lightning-icon icon-name="utility:einstein" size="small" variant="inverse" class="nav-agentforce-icon"></lightning-icon>
                </button>
            </template>
        </div>

        <!-- Toolbar -->
        <template lwc:if={isTraining}>
            <div class="builder-toolbar builder-toolbar_training">
                <div class="toolbar-left">
                    <div class="training-version-pill">
                        <span class="training-version-label">{labels.TrainingVersionPillLabel}</span>
                        <lightning-icon icon-name="utility:chevrondown" size="xx-small" variant="bare" class="training-version-chevron"></lightning-icon>
                    </div>
                    <span class="training-last-updated">{labels.TrainingLastUpdatedLabel}</span>
                </div>
            </div>
        </template>
        <template lwc:else>
            <div class="builder-toolbar">
                <div class="toolbar-left">
                    <lightning-button-group>
                        <lightning-button-icon icon-name="utility:toggle_panel_left" variant="border-filled" size="small" alternative-text="Toggle left panel" onclick={handleToggleLeft}></lightning-button-icon>
                        <lightning-button-icon icon-name="utility:toggle_panel_right" variant="border-filled" size="small" alternative-text="Toggle right panel" onclick={handleToggleRight}></lightning-button-icon>
                    </lightning-button-group>
                </div>
                <div class="toolbar-right">
                    <template lwc:if={showPrevious}>
                        <lightning-button label={previousButtonLabel} variant="neutral" onclick={handlePrevious}></lightning-button>
                    </template>
                    <template lwc:if={isFinalStep}>
                        <lightning-button label={labels.SaveTrainButton} variant="brand" onclick={handleSaveTrain}></lightning-button>
                    </template>
                    <template lwc:else>
                        <lightning-button label={labels.NextButton} variant="brand" onclick={handleNext} disabled={isNextDisabled}></lightning-button>
                    </template>
                </div>
            </div>
        </template>

        <!-- Body -->
        <template lwc:if={isTraining}>
            <div class="training-body">
                <div class="training-content" role="status" aria-live="polite">
                    <h2 class="training-title">{labels.TrainingCardTitle}</h2>
                    <p class="training-subtitle">{labels.TrainingCardSubtitle}</p>
                    <div class="slds-scoped-notification slds-scoped-notification_light slds-media slds-media_center training-meta-bar" role="status">
                        <div class="slds-media__body training-meta-body">
                            <p>
                                <strong>{labels.TrainingStartedTitle}</strong>
                                <span class="training-meta-value">{labels.TrainingStartedValue}</span>
                                <span class="training-meta-divider" aria-hidden="true">|</span>
                                <strong>{labels.TrainingEtaTitle}</strong>
                                <span class="training-meta-value">{labels.TrainingEtaValue}</span>
                            </p>
                        </div>
                    </div>

                    <div class="training-progress" role="list">
                        <template for:each={trainingStages} for:item="stage">
                            <div key={stage.id} class={stage.itemClass} role="listitem">
                                <div class="training-stage-rail" aria-hidden="true">
                                    <span class="training-stage-connector training-stage-connector_top"></span>
                                    <span class="training-stage-marker">
                                        <template lwc:if={stage.isComplete}>
                                            <svg viewBox="0 0 16 16" class="training-stage-check" focusable="false">
                                                <path d="M12.5 5 L6.5 11 L3.5 8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </template>
                                    </span>
                                    <span class="training-stage-connector training-stage-connector_bottom"></span>
                                </div>
                                <div class="training-stage-label">{stage.label}</div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="training-footer">
                    <button type="button" class="training-cancel-link" onclick={handleCancelTraining}>{labels.CancelTrainingLink}</button>
                    <div class="training-footer-actions">
                        <lightning-button label={labels.BackToClusterBuilderButton} variant="neutral" onclick={handleBackToClusterBuilder}></lightning-button>
                        <lightning-button label={notifyButtonLabel} variant={notifyButtonVariant} icon-name={notifyButtonIcon} onclick={handleToggleNotify}></lightning-button>
                    </div>
                </div>
            </div>
        </template>
        <template lwc:else>
        <div class="builder-body">
            <!-- Left Sidebar Steps -->
            <template lwc:if={showLeftPanel}>
                <div class="builder-sidebar">
                    <template for:each={steps} for:item="step">
                        <div key={step.id} class={step.itemClass} data-step={step.id} onclick={handleStepClick}>
                            <template lwc:if={step.isComplete}>
                                <span class="step-icon step-icon_complete" aria-hidden="true">
                                    <svg viewBox="0 0 16 16" class="step-check-svg" focusable="false">
                                        <path d="M13.5 4.5 L6.5 11.5 L2.5 7.5" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </span>
                            </template>
                            <template lwc:else>
                                <span class={step.iconClass}>
                                    <lightning-icon icon-name={step.iconName} size="xx-small"></lightning-icon>
                                </span>
                            </template>
                            <span class={step.labelClass}>{step.number}. {step.label}</span>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Center Content -->
            <div class="builder-center">
                <!-- Step 1: Select Data -->
                <template lwc:if={isStep1}>
                    <div class="center-header">
                        <h2 class="center-title">{labels.SelectDataTitle}</h2>
                    </div>
                    <div class="center-form">
                        <div class="form-field">
                            <lightning-combobox
                                label={labels.DataSpaceLabel}
                                placeholder={labels.DataSpacePlaceholder}
                                value="AMER"
                                options={dataSpaceOptions}
                                required
                            ></lightning-combobox>
                        </div>
                        <div class="form-field">
                            <span class="field-label">{labels.DataLabel}</span>
                            <div class="grouped-combobox-row">
                                <div class="grouped-combobox">
                                    <lightning-combobox
                                        label={labels.DataObjectType}
                                        variant="label-hidden"
                                        value="dmo"
                                        options={dataObjectTypeOptions}
                                        class="grouped-combobox__type"
                                    ></lightning-combobox>
                                    <div class="dmo-search-wrapper">
                                        <lightning-input
                                            type="search"
                                            label={labels.DataSearchPlaceholder}
                                            variant="label-hidden"
                                            placeholder={labels.DataSearchPlaceholder}
                                            value={dmoSearchValue}
                                            onfocus={handleDmoSearchFocus}
                                            onchange={handleDmoSearchInput}
                                            onblur={handleDmoSearchBlur}
                                            class="dmo-search-input"
                                        ></lightning-input>
                                        <template lwc:if={showDmoDropdown}>
                                            <div class="dmo-dropdown">
                                                <template for:each={filteredDmoItems} for:item="item">
                                                    <div key={item.id} class="dmo-dropdown-item" data-id={item.id} onmousedown={handleDmoSelect}>
                                                        <lightning-icon icon-name="standard:data_model" size="small"></lightning-icon>
                                                        <span class="dmo-item-label">{item.label} ({item.apiName})</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                                <lightning-button label={labels.ViewDataButton} variant="brand-outline" onclick={handleViewData}></lightning-button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Step 2: Filter Data -->
                <template lwc:if={isStep2}>
                    <div class="center-header">
                        <h2 class="center-title">{labels.FilterDataTitle}</h2>
                    </div>
                    <div class="center-form">
                        <div class="vpicker-group">
                            <div class="vpicker">
                                <input type="radio" id="picker-all" value="all" name="filter-picker" class="vpicker-input" checked={isAllRecordsSelected} onchange={handleSelectAllRecords} />
                                <label for="picker-all" class="vpicker-label">
                                    <span class="vpicker-figure">
                                        <span class="vpicker-icon">
                                            <lightning-icon icon-name="utility:table" size="medium"></lightning-icon>
                                        </span>
                                        <span class="vpicker-title">All Records</span>
                                        <span class="vpicker-desc">Use all records available in the selected data to train the model.</span>
                                    </span>
                                    <span class="vpicker-ribbon" aria-hidden="true">
                                        <svg viewBox="0 0 32 32" class="vpicker-ribbon-svg" focusable="false">
                                            <path d="M0 0H32V32z"></path>
                                        </svg>
                                        <span class="vpicker-ribbon-check">
                                            <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </span>
                                </label>
                            </div>
                            <div class="vpicker">
                                <input type="radio" id="picker-filtered" value="filtered" name="filter-picker" class="vpicker-input" checked={isFilteredRecordsSelected} onchange={handleSelectFilteredRecords} />
                                <label for="picker-filtered" class="vpicker-label">
                                    <span class="vpicker-figure">
                                        <span class="vpicker-icon">
                                            <lightning-icon icon-name="utility:table" size="medium"></lightning-icon>
                                        </span>
                                        <span class="vpicker-title">Filtered Set of Records</span>
                                        <span class="vpicker-desc">Set criteria for which records to use to train the model.</span>
                                    </span>
                                    <span class="vpicker-ribbon" aria-hidden="true">
                                        <svg viewBox="0 0 32 32" class="vpicker-ribbon-svg" focusable="false">
                                            <path d="M0 0H32V32z"></path>
                                        </svg>
                                        <span class="vpicker-ribbon-check">
                                            <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </span>
                                </label>
                            </div>
                        </div>
                        <div class="slds-scoped-notification slds-media slds-media_center record-count-bar" role="status">
                            <div class="slds-media__figure">
                                <span class="record-count-info-badge">
                                    <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                </span>
                            </div>
                            <div class="slds-media__body">
                                <p class="record-count-text">4,204,535 of 4,204,535 included</p>
                            </div>
                            <div class="slds-media__figure slds-media__figure_reverse">
                                <a href="#" class="record-count-link">Refresh</a>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Step 4: Define Settings -->
                <template lwc:if={isStep4}>
                    <div class="center-header center-header_prepare">
                        <h2 class="center-title">
                            <span class="center-title_bold">{labels.DefineSettingsTitleBold}</span>
                            <span class="center-title_thin">{labels.DefineSettingsTitleRest}</span>
                        </h2>
                    </div>
                    <div class="center-form">
                        <div class="algo-picker-group">
                            <div class="vpicker">
                                <input type="radio" id="algo-kmeans" value="kmeans" name="algo-picker" class="vpicker-input" checked={isKMeansSelected} onchange={handleSelectKMeans} />
                                <label for="algo-kmeans" class="vpicker-label">
                                    <span class="vpicker-figure algo-figure">
                                        <span class="algo-icon">
                                            <lightning-icon icon-name="utility:formula" size="medium"></lightning-icon>
                                        </span>
                                        <span class="vpicker-title">{labels.KMeansTitle}</span>
                                        <span class="vpicker-desc">{labels.KMeansDesc}</span>
                                    </span>
                                    <span class="vpicker-ribbon" aria-hidden="true">
                                        <svg viewBox="0 0 32 32" class="vpicker-ribbon-svg" focusable="false">
                                            <path d="M0 0H32V32z"></path>
                                        </svg>
                                        <span class="vpicker-ribbon-check">
                                            <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </span>
                                </label>
                            </div>
                            <div class="vpicker">
                                <input type="radio" id="algo-hdbscan" value="hdbscan" name="algo-picker" class="vpicker-input" checked={isHdbscanSelected} onchange={handleSelectHdbscan} />
                                <label for="algo-hdbscan" class="vpicker-label">
                                    <span class="vpicker-figure algo-figure">
                                        <span class="algo-icon">
                                            <lightning-icon icon-name="utility:formula" size="medium"></lightning-icon>
                                        </span>
                                        <span class="vpicker-title">{labels.HDBScanTitle}</span>
                                        <span class="vpicker-desc">{labels.HDBScanDesc}</span>
                                    </span>
                                    <span class="vpicker-ribbon" aria-hidden="true">
                                        <svg viewBox="0 0 32 32" class="vpicker-ribbon-svg" focusable="false">
                                            <path d="M0 0H32V32z"></path>
                                        </svg>
                                        <span class="vpicker-ribbon-check">
                                            <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <template lwc:if={isKMeansSelected}>
                            <div class="cluster-settings-section">
                                <h3 class="cluster-settings-title">{labels.ClusterSettingsTitle}</h3>
                                <div class="slds-scoped-notification slds-media slds-media_center auto-cluster-bar" role="status">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="utility:magicwand" size="small" class="auto-cluster-icon"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <p class="auto-cluster-text">{labels.AutoClusterToggleLabel}</p>
                                    </div>
                                    <div class="slds-media__figure slds-media__figure_reverse">
                                        <div class="auto-cluster-toggle-wrap">
                                            <label class="slds-checkbox_toggle">
                                                <input type="checkbox" checked={autoClusterEnabled} onchange={handleToggleAutoCluster} />
                                                <span class="slds-checkbox_faux_container">
                                                    <span class="slds-checkbox_faux"></span>
                                                    <span class="slds-checkbox_on">{labels.AutoClusterEnabled}</span>
                                                    <span class="slds-checkbox_off">{labels.AutoClusterDisabled}</span>
                                                </span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <template lwc:if={showNumberOfClusters}>
                                    <div class="cluster-count-field">
                                        <div class="cluster-count-label-row">
                                            <span class="cluster-count-label">{labels.NumberOfClustersLabel}</span>
                                            <span class="var-panel-info-badge">
                                                <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                            </span>
                                        </div>
                                        <div class="cluster-stepper">
                                            <button type="button" class="cluster-stepper-btn" onclick={handleClusterDecrement} disabled={decrementDisabled} aria-label="Decrement">
                                                <lightning-icon icon-name="utility:dash" size="xx-small" variant="inverse" class="cluster-stepper-icon"></lightning-icon>
                                            </button>
                                            <input type="number" class="cluster-stepper-input" min="2" max="10" value={numberOfClusters} onchange={handleClusterCountChange} />
                                            <button type="button" class="cluster-stepper-btn" onclick={handleClusterIncrement} disabled={incrementDisabled} aria-label="Increment">
                                                <lightning-icon icon-name="utility:add" size="xx-small" variant="inverse" class="cluster-stepper-icon"></lightning-icon>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Step 5: Review & Save -->
                <template lwc:if={isStep5}>
                    <div class="center-header">
                        <h2 class="center-title">{labels.ReviewTitle}</h2>
                    </div>
                    <div class="center-form">
                        <div class="review-name-row">
                            <div class="review-field review-field_grow">
                                <label class="review-field-label review-field-label_required">{labels.ModelNameLabel}</label>
                                <lightning-input
                                    type="text"
                                    variant="label-hidden"
                                    value={modelName}
                                    onchange={handleModelNameChange}
                                    class="review-input"
                                ></lightning-input>
                            </div>
                            <div class="review-field review-field_version">
                                <label class="review-field-label">{labels.VersionLabel}</label>
                                <lightning-input
                                    type="text"
                                    variant="label-hidden"
                                    value={labels.VersionValue}
                                    disabled
                                    class="review-input"
                                ></lightning-input>
                            </div>
                        </div>
                        <div class="review-field">
                            <label class="review-field-label">{labels.ClusterDescriptionLabel}</label>
                            <textarea
                                class="review-textarea"
                                onchange={handleClusterDescriptionChange}
                            >{clusterDescription}</textarea>
                        </div>

                        <div class="review-card">
                            <div class="review-card-header">
                                <span class="review-card-title">{labels.ReviewDataTitle}</span>
                                <lightning-button-icon icon-name="utility:forward" variant="border-filled" size="medium" alternative-text="Edit data" data-step="1" onclick={handleEditStep} class="review-card-edit"></lightning-button-icon>
                            </div>
                            <div class="review-card-body">
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:dataset" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-label">{labels.ReviewDataSpaceLabel}</span>
                                    <span class="review-row-value">{labels.ReviewDataSpaceValue}</span>
                                </div>
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:data_model" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-label">{labels.ReviewDmoLabel}</span>
                                    <span class="review-row-value">{reviewDmoValue}</span>
                                </div>
                            </div>
                        </div>

                        <div class="review-card">
                            <div class="review-card-header">
                                <span class="review-card-title">{labels.ReviewFiltersTitle}</span>
                                <lightning-button-icon icon-name="utility:forward" variant="border-filled" size="medium" alternative-text="Edit filters" data-step="2" onclick={handleEditStep} class="review-card-edit"></lightning-button-icon>
                            </div>
                            <div class="review-card-body">
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:record" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-value">{reviewFilterRecords}</span>
                                </div>
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:filter" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-value">{labels.ReviewFiltersInfo}</span>
                                </div>
                            </div>
                        </div>

                        <div class="review-card">
                            <div class="review-card-header">
                                <span class="review-card-title">{labels.ReviewVariablesTitle}</span>
                                <lightning-button-icon icon-name="utility:forward" variant="border-filled" size="medium" alternative-text="Edit variables" data-step="3" onclick={handleEditStep} class="review-card-edit"></lightning-button-icon>
                            </div>
                            <div class="review-card-body">
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:variable" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-value">{reviewVariablesInfo}</span>
                                </div>
                            </div>
                        </div>

                        <div class="review-card">
                            <div class="review-card-header">
                                <span class="review-card-title">{labels.ReviewSettingsTitle}</span>
                                <lightning-button-icon icon-name="utility:forward" variant="border-filled" size="medium" alternative-text="Edit settings" data-step="4" onclick={handleEditStep} class="review-card-edit"></lightning-button-icon>
                            </div>
                            <div class="review-card-body">
                                <div class="review-row">
                                    <lightning-icon icon-name="standard:data_model" size="small" class="review-row-icon"></lightning-icon>
                                    <span class="review-row-label">{labels.ReviewAlgorithmLabel}</span>
                                    <span class="review-row-value">{reviewAlgorithmValue}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Step 3: Prepare Variables -->
                <template lwc:if={isStep3}>
                    <div class="center-header center-header_prepare">
                        <h2 class="center-title">
                            <span class="center-title_bold">{labels.PrepareVariablesTitleBold}</span>
                            <span class="center-title_thin">{labels.PrepareVariablesTitleRest}</span>
                        </h2>
                    </div>
                    <div class="prepare-toolbar">
                        <div class="prepare-toolbar-left">
                            <lightning-button label={labels.ShowOnlySelected} variant={showOnlySelectedVariant} onclick={handleToggleShowOnlySelected}></lightning-button>
                            <span class="prepare-summary">{selectedSummary}</span>
                        </div>
                        <div class="prepare-toolbar-right">
                            <lightning-input
                                type="search"
                                variant="label-hidden"
                                placeholder={labels.VariableSearchPlaceholder}
                                value={variableSearchTerm}
                                onchange={handleVariableSearch}
                                class="prepare-search"
                            ></lightning-input>
                        </div>
                    </div>
                    <div class="prepare-card">
                        <template lwc:if={accountSectionOpen}>
                            <div class="var-table">
                                <div class="var-table-head">
                                    <div class="var-cell var-cell_check">
                                        <lightning-icon icon-name="utility:check" size="xx-small" variant="bare" class="var-head-icon"></lightning-icon>
                                    </div>
                                    <div class="var-cell var-cell_variable">{labels.VariableColumn}</div>
                                    <div class="var-cell var-cell_settings">
                                        <lightning-icon icon-name="utility:settings" size="xx-small" variant="bare" class="var-head-icon"></lightning-icon>
                                        <span>{labels.SettingsColumn}</span>
                                    </div>
                                </div>
                                <template for:each={filteredVariables} for:item="v">
                                    <div key={v.id} class={v.rowClass}>
                                        <div class="var-cell var-cell_check">
                                            <input type="checkbox" class="var-checkbox" data-id={v.id} checked={v.isSelected} onchange={handleVariableToggle} />
                                        </div>
                                        <div class="var-cell var-cell_variable">
                                            <lightning-icon icon-name={v.iconName} size="xx-small" variant="bare" class="var-type-icon"></lightning-icon>
                                            <a href="#" class="var-name" data-id={v.id} onclick={handleVariableNameClick}>{v.name}</a>
                                        </div>
                                        <div class="var-cell var-cell_settings">
                                            <template lwc:if={v.action}>
                                                <lightning-button-group class="var-action-group">
                                                    <lightning-button label={v.actionLabel} variant={v.actionVariant} data-id={v.id} onclick={handleVariableNameClick}></lightning-button>
                                                    <template lwc:if={v.showDelete}>
                                                        <lightning-button-icon icon-name="utility:delete" variant="border-filled" size="medium" alternative-text="Remove" data-id={v.id} onclick={handleRemoveVariable}></lightning-button-icon>
                                                    </template>
                                                </lightning-button-group>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Agentforce Panel (reuses shell-panel Agentforce experience) -->
            <template lwc:if={isAgentforceOpen}>
                <div class="builder-agentforce-slot">
                    <shell-panel selected-panel="agentforce_panel" onpanelclose={handleCloseAgentforce}></shell-panel>
                </div>
            </template>

            <!-- Right Panel -->
            <template lwc:if={showRightPanelContent}>
                <template lwc:if={isVariablePanelOpen}>
                    <div class="builder-panel builder-panel_variable">
                        <div class="var-panel-header">
                            <h3 class="var-panel-title">{activeVariable.name}</h3>
                            <lightning-button-icon icon-name="utility:close" variant="bare" size="small" alternative-text="Close panel" onclick={handleCloseVariablePanel}></lightning-button-icon>
                        </div>
                        <div class="var-panel-tabs">
                            <div class="var-panel-tab">{labels.AlertsTab}</div>
                            <div class="var-panel-tab var-panel-tab_active">{labels.SettingsTab}</div>
                        </div>
                        <div class="var-panel-body">
                            <div class="var-panel-field">
                                <div class="var-panel-label-row">
                                    <span class="var-panel-label">{labels.TransformationLabel}</span>
                                    <span class="var-panel-info-badge">
                                        <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                    </span>
                                </div>
                                <lightning-combobox
                                    variant="label-hidden"
                                    value={activeTransformation}
                                    options={transformationOptions}
                                    onchange={handleTransformationChange}
                                ></lightning-combobox>
                            </div>

                            <template lwc:if={showReplaceMissingOptions}>
                                <div class="var-panel-field">
                                    <div class="var-panel-label-row">
                                        <span class="var-panel-label var-panel-label_required">{labels.ReplaceWithLabel}</span>
                                        <span class="var-panel-info-badge">
                                            <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </div>
                                    <lightning-combobox
                                        variant="label-hidden"
                                        value={activeReplaceWith}
                                        options={replaceWithOptions}
                                        onchange={handleReplaceWithChange}
                                    ></lightning-combobox>
                                </div>
                                <div class="var-panel-field">
                                    <div class="var-panel-label-row">
                                        <span class="var-panel-label var-panel-label_required">{labels.GroupByLabel}</span>
                                        <span class="var-panel-info-badge">
                                            <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </div>
                                    <lightning-combobox
                                        variant="label-hidden"
                                        value={activeGroupBy}
                                        options={groupByOptions}
                                        onchange={handleGroupByChange}
                                    ></lightning-combobox>
                                </div>
                            </template>

                            <template lwc:if={showNumberBuckets}>
                                <div class="var-panel-field">
                                    <div class="var-panel-label-row">
                                        <span class="var-panel-label">{labels.NumberOfBucketsLabel}</span>
                                        <span class="var-panel-info-badge">
                                            <lightning-icon icon-name="utility:info" size="xx-small" variant="inverse"></lightning-icon>
                                        </span>
                                    </div>
                                    <div class="var-panel-bucket-range">{labels.BucketRangeLabel}</div>
                                    <div class="var-panel-slider-row">
                                        <input type="range" min="10" max="100" step="1" value={activeBucketCount} onchange={handleBucketChange} oninput={handleBucketChange} class="var-panel-slider" />
                                        <span class="var-panel-slider-value">{activeBucketCount}</span>
                                    </div>
                                </div>
                            </template>

                            <template lwc:if={showTextFrequencyChart}>
                                <div class="var-panel-distribution">
                                    <h4 class="var-panel-distribution-title">{labels.DistributionLabel}</h4>
                                    <div class="var-freq-chart">
                                        <div class="var-freq-axis">
                                            <span class="var-freq-axis-label">{labels.CountAxisLabel}</span>
                                        </div>
                                        <template for:each={textFrequencies} for:item="row">
                                            <div key={row.label} class="var-freq-row">
                                                <span class="var-freq-label">{row.label}</span>
                                                <div class="var-freq-bar-wrap">
                                                    <div class="var-freq-bar" style={row.barStyle}></div>
                                                    <span class="var-freq-count">{row.count}</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <template lwc:if={showDistribution}>
                                <div class="var-panel-distribution">
                                    <h4 class="var-panel-distribution-title">{labels.DistributionLabel}</h4>
                                    <p class="var-panel-distribution-row">
                                        <span class="var-panel-distribution-label">{labels.MinValueLabel}</span>
                                        <span class="var-panel-distribution-value">{distributionMin}</span>
                                    </p>
                                    <p class="var-panel-distribution-row">
                                        <span class="var-panel-distribution-label">{labels.MaxValueLabel}</span>
                                        <span class="var-panel-distribution-value">{distributionMax}</span>
                                    </p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
                <template lwc:else>
                    <template lwc:if={isArticleOpen}>
                        <div class="builder-panel">
                            <div class="panel-header panel-header_article">
                                <lightning-button-icon icon-name="utility:chevronleft" variant="border-filled" size="small" alternative-text={labels.ArticleBackLabel} onclick={handleCloseArticle} class="panel-article-back"></lightning-button-icon>
                                <h3 class="panel-title panel-title_article">{activeArticle.title}</h3>
                            </div>
                            <div class="panel-header-line"></div>
                            <div class="panel-body">
                                <div class="panel-content panel-content_article">
                                    <template for:each={activeArticle.blocks} for:item="blk">
                                        <template lwc:if={blk.isParagraph}>
                                            <p key={blk.id} class="panel-article-text">{blk.text}</p>
                                        </template>
                                        <template lwc:elseif={blk.isHeading}>
                                            <h4 key={blk.id} class="panel-article-heading">{blk.text}</h4>
                                        </template>
                                        <template lwc:elseif={blk.isUnorderedList}>
                                            <ul key={blk.id} class="panel-article-list">
                                                <template for:each={blk.items} for:item="item">
                                                    <li key={item.id} class="panel-article-list-item">
                                                        <template lwc:if={item.hasStrong}><strong>{item.strong}</strong></template>{item.text}
                                                    </li>
                                                </template>
                                            </ul>
                                        </template>
                                        <template lwc:elseif={blk.isOrderedList}>
                                            <ol key={blk.id} class="panel-article-list panel-article-list_ordered">
                                                <template for:each={blk.items} for:item="item">
                                                    <li key={item.id} class="panel-article-list-item">
                                                        <template lwc:if={item.hasStrong}><strong>{item.strong}</strong></template>{item.text}
                                                    </li>
                                                </template>
                                            </ol>
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="builder-panel">
                            <div class="panel-header">
                                <h3 class="panel-title">{panelTitle}</h3>
                                <lightning-button-icon icon-name="utility:close" variant="bare" size="small" alternative-text="Close panel" onclick={handleToggleRight}></lightning-button-icon>
                            </div>
                            <div class="panel-header-line"></div>
                            <div class="panel-body">
                                <div class="panel-content">
                                    <div class={panelBadgeClass}>
                                        <lightning-icon icon-name={panelBadgeIcon} size="small" class="panel-badge-icon"></lightning-icon>
                                    </div>
                                    <h4 class="panel-headline">{panelHeadline}</h4>
                                    <template for:each={panelBody} for:item="para">
                                        <p key={para.id} class="panel-text">{para.text}</p>
                                    </template>

                                    <template for:each={panelCards} for:item="card">
                                        <div key={card.id} class="panel-info-card">
                                            <span class="panel-info-card-title">{card.title}</span>
                                            <a href="#" class="panel-link" data-article={card.articleId} onclick={handleOpenArticle}>{labels.ShowMore}</a>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </template>
            </template>
        </div>
        </template>
    </div>
</template>
