<template>
    <template lwc:if={hasContact}>
        <!-- Record Page Header -->
        <div class="slds-page-header slds-page-header_record-home">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:contact" size="medium"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span>{labels.Contact}</span>
                                        <span class="slds-page-header__title slds-truncate" title={contactName}>{contactName}</span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button
                                label={followLabel}
                                variant={followVariant}
                                icon-name={followIconName}
                                onclick={handleFollow}>
                            </lightning-button>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-group>
                                <lightning-button label={labels.Edit} variant="neutral"></lightning-button>
                                <lightning-button label={labels.Delete} variant="neutral"></lightning-button>
                                <lightning-button label={labels.Clone} variant="neutral"></lightning-button>
                                <lightning-button-menu
                                    alternative-text={labels.MoreActions}
                                    variant="border-filled"
                                    icon-size="medium"
                                    menu-alignment="right">
                                    <lightning-menu-item label={labels.SendEmail} value="send_email"></lightning-menu-item>
                                    <lightning-menu-item label={labels.LogCall} value="log_call"></lightning-menu-item>
                                    <lightning-menu-item label={labels.CreateTask} value="create_task"></lightning-menu-item>
                                </lightning-button-menu>
                            </lightning-button-group>
                        </div>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__row slds-page-header__row_gutters">
                <div class="slds-page-header__col-details">
                    <ul class="slds-page-header__detail-row">
                        <li class="slds-page-header__detail-block">
                            <div class="slds-text-title slds-truncate" title={labels.Company}>{labels.Company}</div>
                            <div class="slds-truncate" title={contact.company}>{contact.company}</div>
                        </li>
                        <li class="slds-page-header__detail-block">
                            <div class="slds-text-title slds-truncate" title={labels.Title}>{labels.Title}</div>
                            <div class="slds-truncate" title={contact.title}>{contact.title}</div>
                        </li>
                        <li class="slds-page-header__detail-block">
                            <div class="slds-text-title slds-truncate" title={labels.Email}>{labels.Email}</div>
                            <div class="slds-truncate" title={contact.email}>
                                <lightning-formatted-email value={contact.email}></lightning-formatted-email>
                            </div>
                        </li>
                        <li class="slds-page-header__detail-block">
                            <div class="slds-text-title slds-truncate" title={labels.Phone}>{labels.Phone}</div>
                            <div class="slds-truncate" title={contact.phone}>
                                <lightning-formatted-phone value={contact.phone}></lightning-formatted-phone>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Body: 2/3 Details + 1/3 Activity -->
        <div class="slds-grid slds-gutters slds-m-top_medium">
            <!-- Left 2/3: Details Card -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">
                <lightning-card title={labels.ContactDetails}>
                    <div class="slds-p-bottom_small">
                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.FullName}
                                    value={contact.name}
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.AccountName}
                                    value={contact.company}
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.Title}
                                    value={contact.title}
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.Department}
                                    value={contact.department}
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.Email}
                                    value={contact.email}
                                    type="email"
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.Phone}
                                    value={contact.phone}
                                    type="tel"
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.Mobile}
                                    value={contact.mobile}
                                    type="tel"
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                <lightning-input
                                    label={labels.MailingAddress}
                                    value={mailingAddress}
                                    read-only>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                <lightning-textarea
                                    label={labels.Description}
                                    value={contact.description}
                                    read-only>
                                </lightning-textarea>
                            </div>
                        </div>
                    </div>
                </lightning-card>
            </div>

            <!-- Right 1/3: Activity Feed -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                <lightning-card title={labels.Activity}>
                    <lightning-button-group slot="actions">
                        <lightning-button label={labels.LogCall} variant="neutral"></lightning-button>
                        <lightning-button label={labels.NewTask} variant="neutral"></lightning-button>
                    </lightning-button-group>
                    <div class="slds-p-bottom_small">
                        <ul class="slds-timeline">
                            <template for:each={activityItems} for:item="item">
                                <li key={item.id} class="slds-timeline__item">
                                    <div class="slds-media slds-m-bottom_small">
                                        <div class="slds-media__figure">
                                            <template lwc:if={item.type}>
                                                <lightning-icon
                                                    icon-name={item.iconName}
                                                    size="small"
                                                    alternative-text={item.type}>
                                                </lightning-icon>
                                            </template>
                                        </div>
                                        <div class="slds-media__body">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <p class="slds-truncate">
                                                    <strong>{item.subject}</strong>
                                                </p>
                                                <p class="slds-text-body_small slds-text-color_weak slds-no-flex">{item.date}</p>
                                            </div>
                                            <p class="slds-text-body_small slds-m-top_xx-small">{item.description}</p>
                                        </div>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </lightning-card>
            </div>
        </div>
    </template>

    <template lwc:else>
        <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
            <p class="slds-text-heading_medium">{labels.ContactNotFound}</p>
            <p class="slds-m-top_small">
                <lightning-button label={labels.BackToContacts} variant="brand" onclick={handleBackToList}></lightning-button>
            </p>
        </div>
    </template>
</template>
