<template>
    <div class="slds-container_x-large slds-container_center">
        <div class="slds-page-header">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:contact" size="medium"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span>{labels.Contacts}</span>
                                        <span class="slds-page-header__title slds-truncate" title={labels.AllContacts}>{labels.AllContacts}</span>
                                    </h1>
                                </div>
                                <div class="slds-page-header__name-switcher slds-is-relative slds-m-bottom_x-small">
                                    <lightning-button-icon
                                        icon-name="utility:down"
                                        variant="bare"
                                        size="small"
                                        alternative-text={labels.SwitchListView}
                                        title={labels.SwitchListView}>
                                    </lightning-button-icon>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button-group>
                                <lightning-button label={labels.New} variant="neutral"></lightning-button>
                                <lightning-button label={labels.Import} variant="neutral"></lightning-button>
                                <lightning-button label={labels.AddToCampaign} variant="neutral"></lightning-button>
                                <lightning-button label={labels.SendEmail} variant="neutral"></lightning-button>
                            </lightning-button-group>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-menu
                                alternative-text={labels.MoreActions}
                                variant="border-filled"
                                icon-size="medium"
                                menu-alignment="right">
                                <lightning-menu-item label={labels.PrintableView} value="printable"></lightning-menu-item>
                            </lightning-button-menu>
                        </div>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-meta">
                    <p class="slds-page-header__meta-text">{metaText}</p>
                </div>
                <div class="slds-page-header__col-controls">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-input
                                type="search"
                                label={labels.SearchContacts}
                                variant="label-hidden"
                                placeholder={labels.SearchThisList}
                                onchange={handleSearch}>
                            </lightning-input>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-icon
                                icon-name="utility:settings"
                                variant="border-filled"
                                alternative-text={labels.ListViewControls}
                                title={labels.ListViewControls}>
                            </lightning-button-icon>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-icon
                                icon-name="utility:table"
                                variant="border-filled"
                                alternative-text={labels.ChangeView}
                                title={labels.ChangeView}>
                            </lightning-button-icon>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-icon
                                icon-name="utility:edit"
                                variant="border-filled"
                                alternative-text={labels.EditList}
                                title={labels.EditList}>
                            </lightning-button-icon>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-icon
                                icon-name="utility:refresh"
                                variant="border-filled"
                                alternative-text={labels.RefreshList}
                                title={labels.RefreshList}>
                            </lightning-button-icon>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button-group>
                                <lightning-button-icon
                                    icon-name="utility:chart"
                                    variant="border-filled"
                                    alternative-text={labels.Charts}
                                    title={labels.Charts}>
                                </lightning-button-icon>
                                <lightning-button-icon
                                    icon-name="utility:filterList"
                                    variant="border-filled"
                                    alternative-text={labels.Filters}
                                    title={labels.Filters}>
                                </lightning-button-icon>
                            </lightning-button-group>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <lightning-datatable
            key-field="id"
            data={filteredData}
            columns={columns}
            sorted-by={sortedBy}
            sorted-direction={sortedDirection}
            onsort={handleSort}
            onrowaction={handleRowAction}
            show-row-number-column>
        </lightning-datatable>
    </div>
</template>
