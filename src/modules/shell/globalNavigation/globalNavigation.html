<template>
    <div class="slds-context-bar">
        <div class="slds-context-bar__primary">
            <div
                class={waffleDropdownTriggerClass}
                role="presentation">
                <div class="slds-context-bar__icon-action">
                    <lightning-dynamic-icon
                        type="waffle"
                        alternative-text={labels.AppLauncher}
                        onclick={handleWaffleOpen}>
                    </lightning-dynamic-icon>
                </div>
                <div
                    class="slds-dropdown slds-dropdown_left app-launcher-dropdown"
                    role="menu"
                    aria-label={labels.AppLauncher}
                    if:true={isWaffleMenuOpen}
                    onkeydown={handleWaffleMenuKeydown}>
                    <ul class="slds-dropdown__list" role="group">
                        <template for:each={appsWithActive} for:item="app">
                            <li key={app.id} class={app.itemClass} role="presentation">
                                <a
                                    href="javascript:void(0)"
                                    role="menuitemradio"
                                    aria-checked={app.isActive}
                                    tabindex="-1"
                                    data-value={app.id}
                                    onclick={handleWaffleMenuItemClick}>
                                    <span class="slds-truncate slds-grow">{app.label}</span>
                                    <lightning-icon if:true={app.isActive} icon-name="utility:check" size="x-small"></lightning-icon>
                                    <span if:false={app.isActive} class="app-check-placeholder"></span>
                                </a>
                            </li>
                        </template>
                    </ul>
                </div>
                <span class="slds-context-bar__label-action slds-context-bar__app-name">
                    <span class="slds-truncate" title={activeAppLabel}>{activeAppLabel}</span>
                </span>
            </div>
        </div>
        <nav class="slds-context-bar__secondary" role="navigation" aria-label={labels.AppNavigation}>
            <ul class="slds-grid slds-container_fluid">
                <template for:each={navItemsWithActive} for:item="item">
                    <li key={item.page} class={item.tabClass}>
                        <a
                            href={item.path}
                            class="slds-context-bar__label-action"
                            title={item.label}
                            data-page={item.page}
                            onclick={handleNavItemClick}>
                            <span class="slds-assistive-text" if:true={item.isActive}>Current Page:</span>
                            <span class="slds-truncate" title={item.label}>{item.label}</span>
                        </a>
                    </li>
                </template>
            </ul>
        </nav>
    </div>
</template>
